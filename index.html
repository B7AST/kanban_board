<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="main-title"><h1>Kanban Board</h1></div>
      <button onclick="openModal()" class="form-button">Open Form</button>
      <div class="modal hide-modal">
        <div class="form-wrapper">
          <button onclick="closeModal()" class="close-symbol">&times;</button>
          <form
            action=""
            onsubmit="
              this.reset();
              return false;
            "
          >
            <div class="form-title">
              <label for="title">Title:</label>
              <input type="text" id="title" name="title" required />
            </div>
            <div class="form-description">
              <label for="description">Description:</label>
              <textarea id="description" name="description" required></textarea>
            </div>
            <button type="submit" name="submit" onclick="addTask()" id="add">
              Add Task
            </button>
          </form>
        </div>
      </div>
      <div class="boards">
        <div class="board">
          <div class="board-title todo">To Do</div>
        </div>
        <div class="board">
          <div class="board-title inprog">In Progress</div>
        </div>
        <div class="board">
          <div class="board-title done">Done</div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
